name: Android release build

# Builds the signed APK and AAB and publishes them as a GitHub Release on every
# push to main (a PR merge is a push to main, so it covers both).
#
# Versioning is computed from git history by client/android/app/build.gradle
# (versionName from the latest v* tag + the strongest conventional-commit type
# since it; versionCode from the v* tag count). This workflow then creates the
# matching vX.Y tag on the built commit, which advances the count so the next
# push gets the next versionCode automatically. You never tag by hand: just push,
# and download the AAB from the Release page to upload to the Play Store.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   ANDROID_KEYSTORE_BASE64    base64 of the upload keystore: `base64 -w0 keystore2.jks`
#   ANDROID_KEYSTORE_PASSWORD  keystore store password
#   ANDROID_KEY_ALIAS          key alias (e.g. "upload")
#   ANDROID_KEY_PASSWORD       key password (same as the store password for this key)

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write # create the vX.Y tag and publish the GitHub Release

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build signed APK + AAB
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history + tags for git-based versioning)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # build.gradle reads tags via `git describe`; shallow clone would break it

      - name: Verify signing secrets are present
        env:
          KS: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KS" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 is not set. Add the signing secrets (see the workflow header)."
            exit 1
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Active LTS; Capacitor 8 CLI requires Node >=22 (cap sync fails on 20)
          cache: npm

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Install Android SDK packages (compileSdk 36)
        run: |
          sdkmanager="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | "$sdkmanager" --licenses >/dev/null 2>&1 || true
          "$sdkmanager" "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      - name: Cache vendored foliate-js
        uses: actions/cache@v4
        with:
          path: client/public/foliate-js
          # Busts when the vendor script (which holds the pinned commit) changes.
          key: foliate-js-${{ hashFiles('client/scripts/vendor-foliate.sh') }}

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build web (android mode) + Capacitor sync
        working-directory: client
        # build:android runs the prebuild hook (vendors foliate-js + strips source maps)
        # then `vite build --mode android` (bakes the production API URL).
        run: |
          npm run build:android
          npx cap sync android

      - name: Decode signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Build signed APK + AAB
        id: build
        working-directory: client/android
        env:
          MISLIBROS_KEYSTORE_PATH: ${{ runner.temp }}/release.jks
          MISLIBROS_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          MISLIBROS_KEYSTORE_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          MISLIBROS_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon assembleRelease bundleRelease | tee build.log
          ver=$(grep -oE 'MisLibros version: .*' build.log | head -1)
          echo "### ${ver:-build complete}" >> "$GITHUB_STEP_SUMMARY"
          # Parse "MisLibros version: 1.1 (versionCode 2)" -> version=1.1, tag=v1.1
          version=$(printf '%s' "$ver" | sed -nE 's/^MisLibros version: ([^ ]+).*/\1/p')
          if [ -z "$version" ]; then
            echo "::error::Could not parse versionName from build log; cannot tag the release."
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Verify artifacts are signed
        working-directory: client/android
        run: |
          aab=app/build/outputs/bundle/release/app-release.aab
          apk=app/build/outputs/apk/release/app-release.apk
          test -f "$apk" || { echo "::error::APK missing"; exit 1; }
          jarsigner -verify "$aab" | grep -q "jar verified" || { echo "::error::AAB is not signed"; exit 1; }
          echo "Signed APK + AAB verified."

      # Creates the vX.Y tag on this commit (advancing the tag count that
      # build.gradle uses for the next versionCode) and publishes a Release
      # with the signed APK + AAB attached. Tag creation is not blocked by
      # branch protection, so this works for both PR-merge and direct push.
      - name: Publish GitHub Release with APK + AAB
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.build.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: MisLibros ${{ steps.build.outputs.version }}
          generate_release_notes: true
          make_latest: true
          fail_on_unmatched_files: true
          files: |
            client/android/app/build/outputs/apk/release/app-release.apk
            client/android/app/build/outputs/bundle/release/app-release.aab
